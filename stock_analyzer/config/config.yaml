# ============================================================
# 股市分析器配置
# ============================================================

# 自选股票池
watchlist:
  a_share:
    - "000858"    # 五粮液
    - "600519"    # 贵州茅台
    - "300750"    # 宁德时代
    - "601318"    # 中国平安
    - "000333"    # 美的集团
    - "002415"    # 海康威视
    - "600036"    # 招商银行
    - "000651"    # 格力电器
  hk:
    - "0700.HK"   # 腾讯控股
    - "9988.HK"   # 阿里巴巴
    - "3690.HK"   # 美团
  us:
    - "AAPL"      # 苹果
    - "TSLA"      # 特斯拉
    - "MSFT"      # 微软
    - "NVDA"      # 英伟达

# 需要监控的大盘指数
indexes:
  a_share:
    - code: "sh000001"
      name: "上证指数"
    - code: "sh000300"
      name: "沪深300"
    - code: "sz399006"
      name: "创业板指"
    - code: "sh000688"
      name: "科创50"
    - code: "sh000016"
      name: "上证50"
  hk:
    - code: "^HSI"
      name: "恒生指数"
    - code: "^HSTECH"
      name: "恒生科技"
  us:
    - code: "^GSPC"
      name: "标普500"
    - code: "^IXIC"
      name: "纳斯达克"
    - code: "^DJI"
      name: "道琼斯"

# 智能筛选参数
screener:
  enabled: true
  top_n: 10
  criteria:
    volume_surge:
      enabled: true
      multiplier: 1.5
    price_surge:
      enabled: true
      min_change_pct: 3.0
      max_change_pct: 10.0
    hot_turnover:
      enabled: true
      top_n: 20
    oversold:
      enabled: true
      rsi_threshold: 30

# AI 分析
ai_analysis:
  enabled: true
  model: "deepseek-v4-pro"
  max_tokens: 4096
  temperature: 0.3

# 新闻配置
news:
  max_items: 8
  hours_back: 24

# 推送配置
notification:
  on_non_trading_day: false
  split_long_message: true
  max_message_bytes: 18000
